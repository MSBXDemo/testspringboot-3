# Default Helm values for test-springboot-3
# Override in environment-specific values files: values-dev.yaml, values-prod.yaml

replicaCount: 2

image:
  repository: ghcr.io/MSBXDemo/test-springboot-3
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: test-springboot-3.example.internal
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

# Mastercard governance labels applied to all resources
governance:
  costCenter: "MC-1234"
  targetCloud: aws
  owner: group:default/msbx-engineering

env:
  SPRING_PROFILES_ACTIVE: production
  SERVER_PORT: "8080"
